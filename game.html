        <div class="gift">🧸 Cute Teddy</div>
        <audio id="music" >
  <source src="myp\Dooron Dooron.mp3" type="audio/mpeg">
</audio>

<script>
(function () {
  const audio = document.getElementById("music");
  const savedTime = localStorage.getItem("sharedAudioTime");

  if (savedTime) {
    audio.currentTime = parseFloat(savedTime);
  }

  const startAudio = () => {
    audio.play().catch(() => {});
    document.removeEventListener("click", startAudio);
    document.removeEventListener("touchstart", startAudio);
  };

  document.addEventListener("click", startAudio);
  document.addEventListener("touchstart", startAudio);

  setInterval(() => {
    localStorage.setItem("sharedAudioTime", audio.currentTime);
  }, 500);
})();
</script>
</body>
