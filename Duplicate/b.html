<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Photo Framework</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Poppins", sans-serif;
}

body{
  background: linear-gradient(135deg,#ff1b6b,#ff758c);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:2rem;
  font-weight:bold;
  text-shadow:0 0 10px pink;
}

/* MAIN GRID */
.gallery-layout{
  display:grid;
  grid-template-columns: 1fr 3fr;
  height:100vh;
}

/* VERTICAL SCROLL PANEL */
.vertical-panel{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  border-right:2px solid rgba(255,255,255,0.2);
  overflow-y:auto;
  padding:15px;
}

.vertical-panel h3{
  margin-bottom:10px;
  color:#fff;
}

/* Vertical Images */
.v-card{
  margin-bottom:15px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(255,0,100,0.4);
}
.v-card img{
  width:100%;
  display:block;
  transition:0.3s;
}
.v-card img:hover{
  transform:scale(1.05);
}

/* HORIZONTAL SCROLL PANEL */
.horizontal-panel{
  padding:20px;
  overflow-x:auto;
  display:flex;
  gap:20px;
  align-items:center;
}

/* Horizontal Cards */
.h-card{
  min-width:260px;
  height:360px;
  border-radius:25px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  border:2px solid rgba(255,255,255,0.3);
  box-shadow:0 0 20px rgba(255,0,100,0.5);
  overflow:hidden;
  transition:0.4s;
  position:relative;
}
.h-card:hover{
  transform:scale(1.1);
  box-shadow:0 0 40px hotpink;
}

.h-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Love Heart Overlay */
.h-card::after{
  content:"❤";
  font-size:60px;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  color:white;
  transition:0.3s;
}
.h-card:hover::after{
  opacity:1;
}

/* Scrollbar Styling */
.horizontal-panel::-webkit-scrollbar{
  height:8px;
}
.horizontal-panel::-webkit-scrollbar-thumb{
  background:pink;
  border-radius:10px;
}
.vertical-panel::-webkit-scrollbar{
  width:8px;
}
.vertical-panel::-webkit-scrollbar-thumb{
  background:pink;
  border-radius:10px;
}

/* RESPONSIVE MOBILE */
@media(max-width:768px){
  .gallery-layout{
    grid-template-columns: 1fr;
  }
  .vertical-panel{
    height:200px;
    display:flex;
    gap:10px;
    overflow-x:auto;
    overflow-y:hidden;
  }
  .v-card{
    min-width:150px;
  }
}
</style>
</head>

<body>

<header>💖 Professional Love Photo Framework</header>

<div class="gallery-layout">

  <!-- LEFT VERTICAL SCROLL -->
  <div class="vertical-panel">
    <h3>💌 Memories</h3>

    <div class="v-card"><img src="https://picsum.photos/300/300?1"></div>
    <div class="v-card"><img src="https://picsum.photos/300/300?2"></div>
    <div class="v-card"><img src="https://picsum.photos/300/300?3"></div>
    <div class="v-card"><img src="https://picsum.photos/300/300?4"></div>

  </div>

  <!-- RIGHT HORIZONTAL SCROLL -->
  <div class="horizontal-panel">

    <div class="h-card"><img src="https://picsum.photos/500/700?5"></div>
    <div class="h-card"><img src="https://picsum.photos/500/700?6"></div>
    <div class="h-card"><img src="https://picsum.photos/500/700?7"></div>
    <div class="h-card"><img src="https://picsum.photos/500/700?8"></div>
    <div class="h-card"><img src="https://picsum.photos/500/700?9"></div>

  </div>
  

</div>

        <audio id="music" loop preload="auto">
  <source src="myp\nehu.mp3" type="audio/mpeg">
</audio>

<script>
function playAudio() {
  let audio = document.getElementById("music");
  audio.play().catch(e => console.log(e));

  document.removeEventListener("click", playAudio);
  document.removeEventListener("touchstart", playAudio);
}

document.addEventListener("click", playAudio);
document.addEventListener("touchstart", playAudio);
</script>

</body>
</html>
